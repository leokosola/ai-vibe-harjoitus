        --text:         #f0eee8;
        --text-muted:   #9e9b98;
        --text-faint:   #6b6968;
        --accent:       #f0eee8;

        --wrong-bg:     #2e0e0e;

        --info-text:    #7aabf0;

    .main {

    .score-item {

      color: var(--text);

      height: 3px;
      background: var(--border-light);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;

      border-radius: 99px;
      transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);

      color: var(--text-faint);

      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.5rem;
      line-height: 1.2;
    }

      border: 1px solid var(--border);
      border-radius: var(--radius-lg);

      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;

      max-height: 170px;
      width: auto;
      height: auto;
      object-fit: contain;
      border: 1px solid var(--border-light);
      border-radius: 3px;
      display: block;
      animation: fadeIn 0.3s ease;

      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    .flag-error {
      font-size: 13px;
      color: var(--text-faint);
      text-align: center;
    }

      border: 1px solid var(--hint-border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      margin-bottom: 1rem;
      animation: fadeIn 0.25s ease;

      text-transform: uppercase;
      color: var(--hint-text);

      margin-bottom: 4px;

      color: var(--hint-text);

      font-size: 14px;
      font-weight: 600;

      color: var(--correct-text);

      color: var(--wrong-text);
      border: 1px solid var(--wrong-border);
    }

    .feedback.revealed {
      background: var(--info-bg);
      color: var(--info-text);
      border: 1px solid var(--info-border);
    }

      gap: 8px;
      margin-bottom: 0.75rem;

      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;

      border-color: var(--text);
      box-shadow: 0 0 0 3px rgba(26,25,23,0.08);
    }

      .flag-input:focus { box-shadow: 0 0 0 3px rgba(240,238,232,0.1); }
    }

    .flag-input:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, opacity 0.12s, transform 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }

    .btn:hover:not(:disabled) { background: var(--bg); }
    .btn:active:not(:disabled) { transform: scale(0.97); }

    .btn:disabled {
      opacity: 0.38;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      border-color: transparent;
    }

    .btn-primary:hover:not(:disabled) {

    }

      flex-wrap: wrap;

      margin-bottom: 0.4rem;

      text-transform: uppercase;

    @media (max-width: 480px) {

      .flag-card { padding: 1.5rem 1rem; min-height: 160px; }
      .flag-card img { max-height: 140px; }
      .done-stats { gap: 1.25rem; }

  </style>

/* ── Answer aliases ───────────────────────────────────────────── */
const ALIASES = {
  "czech republic":           ["czechia", "czech"],
  "united kingdom":           ["uk", "great britain", "britain", "england"],
  "netherlands":              ["holland"],
  "north macedonia":          ["macedonia"],
  "bosnia and herzegovina":   ["bosnia", "bosnia-herzegovina", "bosnia herzegovina"],
  "vatican city":             ["vatican", "holy see"],
  "russia":                   ["russian federation"],
  "germany":                  ["deutschland"],
  "greece":                   ["hellas"],
};

/* ── Helpers ──────────────────────────────────────────────────── */
function flagUrl(code) {
  return "https://flagcdn.com/w320/" + code + ".png";
}

// Strips diacritics, punctuation, and normalises whitespace for comparison
function normalize(s) {
  return s.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9 ]/g, "")
    .replace(/\s+/g, " ");
}

function isCorrect(input, countryName) {
  const inp    = normalize(input);
  const target = normalize(countryName);
  if (inp === target) return true;
  return (ALIASES[target] || []).some(a => inp === normalize(a));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Prevents XSS when interpolating user input into HTML attributes
function escapeAttr(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

/* ── State ────────────────────────────────────────────────────── */
function freshState() {
  return {
    queue:           shuffle(COUNTRIES),
    current:         0,
    score:           0,
    wrong:           0,
    // Phases: "answering" | "correct" | "wrong" | "revealed" | "done"
    phase:           "answering",
    inputVal:        "",
    hint:            null,
    hintLoading:     false,
    usedHintIndices: [],
  };
}

let state = freshState();

/* ── Actions ──────────────────────────────────────────────────── */
function submitAnswer() {
  const inp = document.getElementById("answer-input");
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) { inp.focus(); return; }
  state.inputVal = val;
  if (isCorrect(val, state.queue[state.current].name)) {
    state.score++;
    state.phase = "correct";
  } else {
    state.wrong++;
    state.phase = "wrong";
  }
  render();
}

function revealAnswer() {
  state.phase = "revealed";
  render();
}

function nextFlag() {
  state.current++;
  state.inputVal        = "";
  state.hint            = null;
  state.hintLoading     = false;
  state.usedHintIndices = [];
  state.phase = state.current >= state.queue.length ? "done" : "answering";
  render();
}

function restart() {
  state = freshState();
  render();
}

async function fetchHint() {
  const country = state.queue[state.current];
  const unusedIndices = country.hints
    .map((_, i) => i)
    .filter(i => !state.usedHintIndices.includes(i));

  if (unusedIndices.length === 0) {
    state.hint = "No more hints available for this flag!";
    render();
    return;
  }

  state.hintLoading = true;
  render();

  // Brief delay so the "loading" state is visible and feels responsive
  await new Promise(r => setTimeout(r, 350));

  const pick = unusedIndices[Math.floor(Math.random() * unusedIndices.length)];
  state.usedHintIndices.push(pick);
  state.hint        = country.hints[pick];
  state.hintLoading = false;
  render();
}

/* ── Image error handler ─────────────────────────────────────── */
function handleImgError(img) {
  // Try the 2x resolution as a fallback before giving up
  if (!img.dataset.fallback) {
    img.dataset.fallback = "1";
    img.src = img.src.replace("/w320/", "/w640/");
    return;
  }
  // Both sizes failed — show a graceful message
  const card = img.closest(".flag-card");
  if (card) card.innerHTML = '<p class="flag-error">Flag image could not be loaded.</p>';
}

/* ── Render ───────────────────────────────────────────────────── */
function render() {
  const app   = document.getElementById("app");
  const total = state.queue.length;
  const idx   = state.current;

  /* ── Done screen ── */
  if (state.phase === "done") {
    const pct  = Math.round(state.score / total * 100);
    const icon = pct === 100 ? "🎉" : pct >= 70 ? "👏" : "📚";
    app.innerHTML = `
      <div class="done-card">
        <div class="done-icon" aria-hidden="true">${icon}</div>
        <h1 class="done-title">Quiz complete!</h1>
        <p class="done-sub">You went through all ${total} European flags.</p>
        <div class="done-stats">
          <div class="done-stat correct-stat">
            <div class="val">${state.score}</div>
            <div class="lbl">Correct</div>
          </div>
          <div class="done-stat wrong-stat">
            <div class="val">${state.wrong}</div>
            <div class="lbl">Wrong</div>
          </div>
          <div class="done-stat">
            <div class="val">${pct}%</div>
            <div class="lbl">Accuracy</div>
          </div>
        </div>
        <button class="btn btn-primary" onclick="restart()">Play again</button>
      </div>`;
    return;
  }

  /* ── Quiz screen ── */
  const country  = state.queue[idx];
  const pct      = Math.round(idx / total * 100);
  const answered = state.phase === "correct" || state.phase === "revealed";
  const hintsLeft = country.hints.length - state.usedHintIndices.length;
  const canHint  = !answered && !state.hintLoading && hintsLeft > 0;

  // Feedback message
  let feedbackHtml = "";
  if (state.phase === "correct") {
    feedbackHtml = `<div class="feedback correct" role="alert">Correct! It's ${country.name}.</div>`;
  } else if (state.phase === "wrong") {
    feedbackHtml = `<div class="feedback wrong" role="alert">Not quite — try again or use the options below.</div>`;
  } else if (state.phase === "revealed") {
    feedbackHtml = `<div class="feedback revealed" role="alert">The answer is: <strong>${country.name}</strong></div>`;
  }

  // Hint display
  let hintHtml = "";
  if (state.hintLoading) {
    hintHtml = `<div class="hint-box loading"><div class="hint-label">Hint</div><div class="hint-text">Finding a hint…</div></div>`;
  } else if (state.hint) {
    hintHtml = `<div class="hint-box"><div class="hint-label">Hint</div><div class="hint-text">${state.hint}</div></div>`;
  }

  // Hint button label — communicates remaining hints clearly
  let hintLabel;
  if (state.hintLoading)                hintLabel = "Loading…";
  else if (hintsLeft === 0)             hintLabel = "No hints left";
  else if (state.usedHintIndices.length > 0) hintLabel = `Another hint (${hintsLeft} left)`;
  else                                  hintLabel = `Give me a hint (${hintsLeft})`;

  // Secondary action buttons depend on phase
  let secondaryActions = "";
  if (state.phase === "wrong") {
    secondaryActions = `
      <button class="btn btn-sm" onclick="revealAnswer()">Show answer</button>
      <button class="btn btn-primary btn-sm" onclick="nextFlag()">Skip →</button>`;
  } else if (answered) {
    secondaryActions = `<button class="btn btn-primary" onclick="nextFlag()">Next flag →</button>`;
  }

  app.innerHTML = `
    <div class="score-bar">
      <div class="score-item">Flag <strong>${idx + 1} / ${total}</strong></div>
      <div class="score-item">Correct <strong>${state.score}</strong></div>
      <div class="score-item">Wrong <strong>${state.wrong}</strong></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track"
           role="progressbar"
           aria-valuenow="${pct}"
           aria-valuemin="0"
           aria-valuemax="100"
           aria-label="Quiz progress">
        <div class="progress-fill" style="width: ${pct}%"></div>
      </div>
    </div>

    <p class="question-label">Flag quiz · Europe</p>
    <h1 class="question-heading">Which country?</h1>

    <div class="flag-card">
      <img
        id="flag-img"
        src="${flagUrl(country.code)}"
        alt="Flag of an unknown European country — try to guess which one"
        width="320"
        height="170"
        onerror="handleImgError(this)"
      />
    </div>

    ${hintHtml}
    ${feedbackHtml}

    <div class="input-row">
      <input
        class="flag-input"
        id="answer-input"
        type="text"
        placeholder="Type country name…"
        value="${escapeAttr(state.inputVal)}"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Your answer"
        ${answered ? "disabled" : ""}
      />
      <button
        class="btn btn-primary"
        onclick="submitAnswer()"
        aria-label="Submit answer"
        ${answered ? "disabled" : ""}
      >Answer</button>
    </div>

    <div class="action-row">
      <button
        class="btn btn-sm"
        onclick="fetchHint()"
        aria-label="${escapeAttr(hintLabel)}"
        ${canHint ? "" : "disabled"}
      >${hintLabel}</button>
      ${secondaryActions}
    </div>
  `;

  // After render, wire up keyboard behaviour on the input
  if (!answered) {
    const input = document.getElementById("answer-input");
    if (input) {
      input.focus();
      // Place cursor at end of any pre-filled text
      input.setSelectionRange(input.value.length, input.value.length);
      input.addEventListener("keydown", e => { if (e.key === "Enter") submitAnswer(); });
      // Keep state in sync so text survives re-renders
      input.addEventListener("input", e => { state.inputVal = e.target.value; });
    }
  }
}

/* ── Boot ────────────────────────────────────────────────────── */
render();
</script>
</body>
</html>
